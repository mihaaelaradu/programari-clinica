<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista programari</title>
</head>
<body>
<h1>Lista programarilor</h1>

<a th:href="@{/programari/noua}">Adauga programare noua</a>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Pacient</th>
        <th>Medic</th>
        <th>Data si ora</th>
        <th>Motiv</th>
        <th>Stare</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="programare : ${programari}">
        <td th:text="${programare.id}"></td>
        <td th:text="${programare.numePacient}"></td>
        <td th:text="${programare.numeMedic}"></td>
        <td th:text="${programare.dataOra}"></td>
        <td th:text="${programare.motiv}"></td>
        <td th:text="${programare.stare}"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
